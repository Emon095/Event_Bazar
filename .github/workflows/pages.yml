name: Deploy Event Bazar to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "7,37 * * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Refresh public event APIs
        run: |
          python -m pip install --disable-pip-version-check httpx beautifulsoup4
          PYTHONPATH=apps/api python apps/api/scripts/export_live_events.py apps/web/public/data/upcoming.json
        working-directory: .
      - run: npm ci
      - run: npm run build
        env:
          GITHUB_PAGES: "true"
          NEXT_PUBLIC_STATIC_FEEDS: "true"
          NEXT_PUBLIC_SUPABASE_URL: https://jpnhxknzezgizwoqjtcb.supabase.co
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: sb_publishable_7RBBzxJmpIm5Ibv--sqk_w_TOpOkmA8
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
