services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: eventbazar
      POSTGRES_USER: eventbazar
      POSTGRES_PASSWORD: eventbazar
    volumes: [eventbazar_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eventbazar"]
      interval: 5s
      timeout: 3s
      retries: 10
  api:
    build: ./apps/api
    environment:
      DATABASE_URL: postgresql+psycopg://eventbazar:eventbazar@db:5432/eventbazar
      CORS_ORIGINS: http://localhost:3000
      SECRET_KEY: ${SECRET_KEY:-local-docker-secret-change-in-production}
      ADMIN_KEY: ${ADMIN_KEY:-}
      FRONTEND_URL: http://localhost:3000
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: http://localhost:8000/api/v1/auth/google/callback
    ports: ["8000:8000"]
    depends_on:
      db: { condition: service_healthy }
  web:
    build: ./apps/web
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    ports: ["3000:3000"]
    depends_on: [api]
volumes:
  eventbazar_data:
